save_loc: '/home/zhanxiang.hua/scratch/credit_runs/wofs_da_increment_experiment_0417'
seed: 1000

data:
  scaler_type: 'std-wrf'

  # Prognostic variables: these are predicted (input + output, 3D with levels)
  variables: ['QRAIN', 'QNRAIN', 'QHAIL', 'QNHAIL', 'QGRAUP', 'QNGRAUPEL', 'QSNOW', 'QNSNOW']

  # Context upper-air variables: 3D atmospheric state context (input-only)
  # Flattened to var*level channels and passed as input_only_channels
  context_upper_air_variables: ['T', 'QVAPOR', 'U', 'V', 'W', 'GEOPOT', 'REFL_10CM']

  # Observation variable: used to construct the innovation (obs - analysis proxy)
  observation_variables: ['REFL_10CM']

  surface_variables: []
  dynamic_forcing_variables: ['cos_latitude', 'sin_latitude', 'cos_longitude', 'sin_longitude', 'cos_julian_day', 'sin_julian_day', 'cos_local_time', 'sin_local_time', 'cos_solar_zenith_angle', 'insolation','XLAND','HGT']
  diagnostic_variables: []
  forcing_variables: []
  static_variables: []

  save_loc: '/work2/zhanxianghua/wofs_preprocess_to_credit_0413/cases/wofs_*.zarr.zip'
  save_loc_surface: '/work2/zhanxianghua/wofs_preprocess_to_credit_0413/cases/wofs_*.zarr.zip'
  save_loc_dynamic_forcing: '/work2/zhanxianghua/wofs_preprocess_to_credit_0413/cases/wofs_*.zarr.zip'
  save_loc_diagnostic: ''

  mean_path: '/work2/zhanxianghua/wofs_preprocess_to_credit_0413/stats/mean.nc'
  std_path: '/work2/zhanxianghua/wofs_preprocess_to_credit_0413/stats/std.nc'
  concentration_params_json: '/work2/zhanxianghua/wofs_preprocess_to_credit_0413/stats/concentration_tuning.json'

  concentration_level_ops:
    QRAIN:
      ceiling_level: 17
      mode: 'cutoff'   # options: cutoff | sum | mean
    QNRAIN:
      ceiling_level: 17
      mode: 'cutoff'   # options: cutoff | sum | mean
    QHAIL:
      ceiling_level: 17
      mode: 'cutoff'   # options: cutoff | sum | mean
    QNHAIL:
      ceiling_level: 17
      mode: 'cutoff'   # options: cutoff | sum | mean
    QGRAUP:
      ceiling_level: 17
      mode: 'cutoff'   # options: cutoff | sum | mean
    QNGRAUPEL:
      ceiling_level: 17
      mode: 'cutoff'   # options: cutoff | sum | mean
    QSNOW:
      ceiling_level: 17
      mode: 'cutoff'   # options: cutoff | sum | mean
    QNSNOW:
      ceiling_level: 17
      mode: 'cutoff'   # options: cutoff | sum | mean
    

  train_years: [2020]
  valid_years: [2021]

  train_date_range: ['20200301', '20200830']
  valid_date_range: ['20210405', '20210407']

  history_len: 1
  valid_history_len: 1
  forecast_len: 0
  valid_forecast_len: 0
  target_start_step: 1
  zarr_time_chunk: 2
  max_open_files_per_worker: 6
  lead_time_periods: 1
  levels: 17
  prognostic_levels: 17  # effective model levels for concentration prognostic variables
  static_first: False

  boundary:
    variables: ['REFL_10CM']
    surface_variables: []
    reuse_interior_stats: True
    levels: 17
    history_len: 1
    forecast_len: 0
    all_varnames: ['REFL_10CM']

  # all_varnames covers only the prognostic variables (used by loss/metrics)
  all_varnames: ['QRAIN', 'QNRAIN', 'QHAIL', 'QNHAIL', 'QGRAUP', 'QNGRAUPEL', 'QSNOW', 'QNSNOW']

model:
  type: 'wrf'
  levels: 17
  param_interior:
    frames: 1
    image_height: 300
    image_width: 300
    levels: 17
    channels: 8            # QRAIN, QNRAIN (prognostic, with level expansion)
    surface_channels: 0
    input_only_channels: 131  # 7 context vars * 17 levels + 12 dynamic forcing
    output_only_channels: 0   # no diagnostics
    patch_height: 4
    patch_width: 4
    frame_patch_size: 1
    dim: 192
  param_outside:
    frames: 1
    image_height: 300
    image_width: 300
    levels: 17
    channels: 1            # REFL_10CM innovation only
    surface_channels: 0
    patch_height: 4
    patch_width: 4
    frame_patch_size: 1
    dim: 192
  depth: 24
  num_heads: 8
  window_size: 7
  use_spectral_norm: True

trainer:
  type: 'standard-wrf'
  mode: 'ddp'
  use_file_locality_sampler: True
  sync_batch_barrier: False
  no_hang_debug: False
  no_hang_thread_workers: 1
  no_hang_valid_thread_workers: 1
  no_hang_prefetch_factor: 1
  no_hang_valid_prefetch_factor: 1
  no_hang_pin_memory: False
  no_hang_persistent_workers: True
  no_hang_timeout_s: 180
  train_batch_size: 3
  valid_batch_size: 3
  batches_per_epoch: 0
  valid_batches_per_epoch: 0
  thread_workers: 6
  valid_thread_workers: 6
  prefetch_factor: 2
  dataloader_timeout_s: 180
  update_learning_rate: False
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  amp: True
  residual_prediction: False   # output IS the increment — no residual skip needed
  epochs: &epochs 100
  start_epoch: 0
  load_weights: False
  load_optimizer: False
  load_scheduler: False
  load_scaler: False
  skip_validation: True
  use_scheduler: True
  reload_epoch: False
  scheduler:
    scheduler_type: cosine-annealing-restarts
    first_cycle_steps: 1000
    cycle_mult: 2.0
    max_lr: 1.0e-03
    min_lr: 1.0e-04
    warmup_steps: 999
    gamma: 0.8
  grad_max_norm: 1.0
  grad_accum_every: 3
  save_backup_weights: True
  save_best_weights: True
  save_metric_vars: ['QRAIN', 'QNRAIN', 'QHAIL', 'QNHAIL', 'QGRAUP', 'QNGRAUPEL', 'QSNOW', 'QNSNOW']

loss:
  latitude_weights: '/work2/zhanxianghua/wofs_preprocess_to_credit_0409/stats_da/latitude_weights_placeholder.nc'
  use_latitude_weights: False
  use_variable_weights: False
  training_loss: 'mse'
  variable_weights:
    QRAIN: 1.5
    QNRAIN: 1.5
    QHAIL: 1.4
    QNHAIL: 1.4
    QGRAUP: 1.3
    QNGRAUPEL: 1.3
    QSNOW: 1.1
    QNSNOW: 1.1

eval:
  mode: 'none'
  task: 'da-test-eval'
  test_path: '/work2/zhanxianghua/wofs_preprocess_to_credit_0409/cases/wofs_*.zarr.zip'
  test_dyn_path: '/work2/zhanxianghua/wofs_preprocess_to_credit_0409/cases/wofs_*.zarr.zip'
  test_date_range: ['20200415', '20200515']
  save_forecast: '/work2/zhanxianghua/da_test/wofs_da_increment_experiment_0413/eval_test'
  output_inference_name: 'test_samples_2020.zarr'
  output_metrics_name: 'test_metrics_2020.csv'
  save_inference: True
  overwrite_samples_store: True
  batch_size: 8
  max_samples: 1024
  num_workers: 8
  shuffle: True
  drop_last: False
  persistent_workers: True
  prefetch_factor: 2
  dataloader_mp_context: 'spawn'
  loader_seed: 1000

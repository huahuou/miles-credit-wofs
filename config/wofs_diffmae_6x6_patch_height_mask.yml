    QHAIL: {ceiling_level: 17, mode: cutoff}
    QNHAIL: {ceiling_level: 17, mode: cutoff}
    QGRAUP: {ceiling_level: 17, mode: cutoff}
    QNGRAUPEL: {ceiling_level: 17, mode: cutoff}

save_loc: '/scratch5/purged/Zhanxiang.Hua/credit_runs/wofs_da_increment_experiment_0430'
seed: 1000

data:
  scaler_type: 'std-wrf'

  # Prognostic variables: these are predicted (input + output, 3D with levels)
  variables: ['QRAIN', 'QNRAIN', 'QHAIL', 'QNHAIL', 'QGRAUP', 'QNGRAUPEL', 'QSNOW', 'QNSNOW']

  # Context upper-air variables: 3D atmospheric state context (input-only)
  # Flattened to var*level channels and passed as input_only_channels
  context_upper_air_variables: ['T', 'QVAPOR', 'U', 'V', 'W', 'GEOPOT', 'REFL_10CM']

  # Observation variable: used to construct the innovation (obs - analysis proxy)
  observation_variables: ['REFL_10CM']

  surface_variables: []
  dynamic_forcing_variables: ['cos_latitude', 'sin_latitude', 'cos_longitude', 'sin_longitude', 'cos_julian_day', 'sin_julian_day', 'cos_local_time', 'sin_local_time', 'cos_solar_zenith_angle', 'insolation','XLAND','HGT']
  diagnostic_variables: []
  forcing_variables: []
  static_variables: []

  save_loc: '/scratch5/purged/Zhanxiang.Hua/wofs_preprocess_to_credit_0413/cases/wofs_*.zarr.zip'
  save_loc_surface: '/scratch5/purged/Zhanxiang.Hua/wofs_preprocess_to_credit_0413/cases/wofs_*.zarr.zip'
  save_loc_dynamic_forcing: '/scratch5/purged/Zhanxiang.Hua/wofs_preprocess_to_credit_0413/cases/wofs_*.zarr.zip'
  save_loc_diagnostic: ''

  mean_path: '/scratch5/purged/Zhanxiang.Hua/wofs_preprocess_to_credit_0413/stats/mean.nc'
  std_path: '/scratch5/purged/Zhanxiang.Hua/wofs_preprocess_to_credit_0413/stats/std.nc'
  # Legacy piecewise concentration transform fallback only.
  concentration_params_json: '/scratch5/purged/Zhanxiang.Hua/wofs_preprocess_to_credit_0413/stats/concentration_tuning.json'
  # Generalized concentration transform spec.
  # Recommended workflow:
  #   1. python python_scripts/build_zero_inflated_transform_params.py \
  #        --glob <cases_glob> --output <stats_dir>/zero_inflated_transform_params.json
  #   2. python python_scripts/compute_credit_stats.py \
  #        --glob <cases_glob> --transform-params-json <stats_dir>/zero_inflated_transform_params.json ...
  #   3. Train with the same transform JSON path below.
  log_transform_params_json: '/scratch5/purged/Zhanxiang.Hua/wofs_preprocess_to_credit_0413/stats/zero_inflated_transform_params.json'
  concentration_normalization_mode: 'zscore'  # options: zscore | transform_only | scale_only

  concentration_level_ops:
    QRAIN:
      ceiling_level: 17
      mode: 'cutoff'   # options: cutoff | sum | mean
    QNRAIN:
      ceiling_level: 17
      mode: 'cutoff'   # options: cutoff | sum | mean
    QHAIL:
      ceiling_level: 17
      mode: 'cutoff'   # options: cutoff | sum | mean
    QNHAIL:
      ceiling_level: 17
      mode: 'cutoff'   # options: cutoff | sum | mean
    QGRAUP:
      ceiling_level: 17
      mode: 'cutoff'   # options: cutoff | sum | mean
    QNGRAUPEL:
      ceiling_level: 17
      mode: 'cutoff'   # options: cutoff | sum | mean
    QSNOW:
      ceiling_level: 17
      mode: 'cutoff'   # options: cutoff | sum | mean
    QNSNOW:
      ceiling_level: 17
      mode: 'cutoff'   # options: cutoff | sum | mean
    

  train_years: [2019,2020]
  valid_years: [2021]

  train_date_range: ['20190101', '20201231']
  valid_date_range: ['20210415', '20210430']

  delta_steps: [1, 2, 3]        # timestep deltas sampled during training
  delta_probs: [0.2, 0.5, 0.3]  # sampling probabilities (must sum to 1)

  history_len: 1
  valid_history_len: 1
  forecast_len: 0
  valid_forecast_len: 0
  target_start_step: 1
  zarr_time_chunk: 2
  max_open_files_per_worker: 4
  lead_time_periods: 1
  levels: 17
  prognostic_levels: 17  # effective model levels for concentration prognostic variables
  occupancy_delta_threshold: 5.0e-9
  occupancy_delta_threshold_by_var: {}
  occupancy_variables: ['QRAIN', 'QNRAIN', 'QHAIL', 'QNHAIL', 'QGRAUP', 'QNGRAUPEL', 'QSNOW', 'QNSNOW']
  occupancy_target_source: 'delta_abs'
  static_first: False

  boundary:
    variables: ['REFL_10CM']
    surface_variables: []
    reuse_interior_stats: True
    levels: 17
    history_len: 1
    forecast_len: 0
    all_varnames: ['REFL_10CM']

  # all_varnames covers only the prognostic variables (used by loss/metrics)
  all_varnames: ['QRAIN', 'QNRAIN', 'QHAIL', 'QNHAIL', 'QGRAUP', 'QNGRAUPEL', 'QSNOW', 'QNSNOW']

model:
  type: 'wrf'
  levels: 17
  param_interior:
    frames: 1
    image_height: 300
    image_width: 300
    levels: 17
    channels: 8            # QRAIN, QNRAIN (prognostic, with level expansion)
    surface_channels: 0
    input_only_channels: 131  # 7 context vars * 17 levels + 12 dynamic forcing
    output_only_channels: 0   # no diagnostics
    patch_height: 4
    patch_width: 4
    frame_patch_size: 1
    dim: 192
  param_outside:
    frames: 1
    image_height: 300
    image_width: 300
    levels: 17
    channels: 1            # REFL_10CM innovation only
    surface_channels: 0
    patch_height: 4
    patch_width: 4
    frame_patch_size: 1
    dim: 192
  depth: 24
  num_heads: 8
  window_size: 7
  use_spectral_norm: True

trainer:
  type: 'standard-wrf'
  mode: 'ddp'
  use_file_locality_sampler: True
  sync_batch_barrier: False
  no_hang_debug: False
  no_hang_thread_workers: 1
  no_hang_valid_thread_workers: 1
  no_hang_prefetch_factor: 1
  no_hang_valid_prefetch_factor: 1
  no_hang_pin_memory: False
  no_hang_persistent_workers: True
  no_hang_timeout_s: 180
  train_batch_size: 24
  valid_batch_size: 24
  batches_per_epoch: 0
  valid_batches_per_epoch: 0
  thread_workers: 4
  valid_thread_workers: 4
  prefetch_factor: 1
  dataloader_timeout_s: 360
  update_learning_rate: False
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  amp: True
  residual_prediction: False   # output IS the increment — no residual skip needed
  epochs: &epochs 100
  start_epoch: 0
  load_weights: False
  load_optimizer: False
  load_scheduler: False
  load_scaler: False
  skip_validation: False
  use_scheduler: True
  reload_epoch: True
  scheduler:
    scheduler_type: cosine-annealing-restarts
    first_cycle_steps: 1000
    cycle_mult: 2.0
    max_lr: 1.0e-03
    min_lr: 1.0e-04
    warmup_steps: 999
    gamma: 0.8
  grad_max_norm: 1.0
  grad_accum_every: 1
  save_backup_weights: True
  save_best_weights: True
  save_metric_vars: ['QRAIN', 'QNRAIN', 'QHAIL', 'QNHAIL', 'QGRAUP', 'QNGRAUPEL', 'QSNOW', 'QNSNOW']

loss:
  latitude_weights: '/scratch5/purged/Zhanxiang.Hua/wofs_preprocess_to_credit_0409/stats_da/latitude_weights_placeholder.nc'
  use_latitude_weights: False
  use_variable_weights: False
  use_spectral_loss: False
  use_power_loss: False
  training_loss: 'mse'
  
  occupancy:
    enabled: true
    delta_threshold: 5.0e-9
    delta_threshold_by_var:
      QHAIL: 1.0e-11
    variables: ['QRAIN', 'QNRAIN', 'QHAIL', 'QNHAIL', 'QGRAUP', 'QNGRAUPEL', 'QSNOW', 'QNSNOW']
    target_source: 'delta_abs'
    use_masked_regression: true
    masked_regression_mode: 'soft'
    reg_mask_min: 0.05
    ce_weight: 0.15
    pos_weight: 5.0
    logit_temperature: 0.25
    use_focal: false
    focal_weight: 0.0
    focal_alpha: 0.25
    focal_gamma: 2.0
    use_dice: false
    dice_weight: 0.0
    dice_smooth: 1.0
  use_microphysics_constraint: true
  microphysics_constraint_weight: 0.001
  microphysics_constraint:
    sign_weight:    0.5
    corr_weight:    0.3
    coral_weight:   0.2
    sign_threshold: 0.1

  # H-operator (reflectivity) constraint — compares diagnosed ΔdBZ to boundary innovation
  use_refl_operator_constraint: true
  refl_operator_constraint_weight: 0.01
  refl_operator_constraint:
    mode: innovation           # innovation | absolute (innovation recommended)
    compare_space: dbz         # dbz | normalized (dbz recommended for fidelity)
    dbz_floor: 0.0             # lower bound for diagnosed dBZ
    threshold_dbz: 5.0         # mask magnitudes below this (clear-air noise gate)
    threshold_norm: 0.05       # mask for normalized mode (unused when compare_space=dbz)
    include_species: [rain, snow, graupel, hail]

  variable_weights:
    QRAIN: 1.5
    QNRAIN: 1.5
    QHAIL: 1.4
    QNHAIL: 1.4
    QGRAUP: 1.3
    QNGRAUPEL: 1.3
    QSNOW: 1.1
    QNSNOW: 1.1

eval:
  mode: 'none'
  delta_step: 1          # fixed timestep delta for evaluation (1, 2, or 3); override with --delta-step CLI arg
  task: 'da-test-eval'
  test_path: '/scratch5/purged/Zhanxiang.Hua/wofs_preprocess_to_credit_0409/cases/wofs_*.zarr.zip'
  test_dyn_path: '/scratch5/purged/Zhanxiang.Hua/wofs_preprocess_to_credit_0409/cases/wofs_*.zarr.zip'
  test_date_range: ['20200415', '20200515']
  save_forecast: '/scratch5/purged/Zhanxiang.Hua/da_test/wofs_da_increment_experiment_0413/eval_test'
  output_inference_name: 'test_samples_2020.zarr'
  output_metrics_name: 'test_metrics_2020.csv'
  save_inference: True
  overwrite_samples_store: True
  batch_size: 8
  max_samples: 1024
  num_workers: 8
  shuffle: True
  drop_last: False
  persistent_workers: True
  prefetch_factor: 2
  dataloader_mp_context: 'spawn'
  loader_seed: 1000

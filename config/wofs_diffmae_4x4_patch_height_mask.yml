# WoFS DiffMAE 6x6 patch configuration with height-aware precip masking.
#
# Height masking keeps the existing cheap spatial tokenization: each precip
# variable group still contributes one token per x/y patch, so target attention
# does not multiply by the number of vertical levels. The 4-D mask
# (batch, group, level, patch) is used for loss weighting and visible-precip
# conditioning. A grouped token is marked as masked when any level in that
# group and patch is masked.
#
# Important options:
# - model.grouped_decoder_scope: per_group decodes each precip group separately.
#   This is the main group-query-style compute reduction versus joint group
#   target self-attention.
# - model.decoder_type: cross_self lets target tokens cross-attend context
#   tokens, then self-attend only within target tokens.
# - model.target_attention_window_size: 0 means global target self-attention.
#   A positive value uses local non-overlapping target windows of that many
#   patch tokens per side. With patch_size=6 and image_size=300, window 10
#   attends over 10x10 patch windows instead of the full 50x50 grid.
# - model.anti_patch_refiner: optional zero-initialized residual CNN applied
#   after patch tiling to reduce patch-edge discontinuities during fine-tuning.
# - trainer.precip_mask_mode/eval.precip_mask_mode: height_patch enables
#   per-level precip masks. mixed_height randomly selects spatial_patch,
#   channel_patch, or height_patch using the mixed_height_*_probability values.
# - height_visible_levels: zero-based vertical levels that should stay visible
#   and be provided as clean visible-precip conditioning.
# - height_mask_levels: optional zero-based levels eligible for masking. Leave
#   unset to allow all levels except height_visible_levels.
# - precip_mask_ratio: fraction sampled from eligible group-level-patch elements.

save_loc: /scratch3/NAGAPE/gpu-ai4wp/Zhanxiang.Hua/credit_runs/wofs_diffmae_pretrain_4x4patch_rev3
seed: 1002
data:
  save_loc: /scratch5/purged/Zhanxiang.Hua/wofs_preprocess_to_credit_0413/cases/wofs_*.zarr.zip
  mean_path: /scratch5/purged/Zhanxiang.Hua/wofs_preprocess_to_credit_0413/stats3/mean.nc
  std_path: /scratch5/purged/Zhanxiang.Hua/wofs_preprocess_to_credit_0413/stats3/std.nc
  log_transform_params_json: /scratch5/purged/Zhanxiang.Hua/wofs_preprocess_to_credit_0413/stats3/zero_inflated_transform_params.json
  concentration_normalization_mode: zscore
  background_vars:
  - T
  - QVAPOR
  - U
  - V
  - W
  - GEOPOT
  precip_vars:
  - QRAIN
  - QNRAIN
  - QHAIL
  - QNHAIL
  - QGRAUP
  - QNGRAUPEL
  - QSNOW
  - QNSNOW
  reflectivity_vars:
  - REFL_10CM
  surface_vars: []
  dynamic_forcing_variables:
  - cos_latitude
  - sin_latitude
  - cos_longitude
  - sin_longitude
  - cos_julian_day
  - sin_julian_day
  - cos_local_time
  - sin_local_time
  - cos_solar_zenith_angle
  - insolation
  - XLAND
  - HGT
  levels: 17
  prognostic_levels: 17
  mae_pad_to: 300
  mae_include_t1_refl: false
  concentration_level_ops:
    QRAIN: {ceiling_level: 17, mode: cutoff}
    QNRAIN: {ceiling_level: 17, mode: cutoff}
    QHAIL: {ceiling_level: 17, mode: cutoff}
    QNHAIL: {ceiling_level: 17, mode: cutoff}
    QGRAUP: {ceiling_level: 17, mode: cutoff}
    QNGRAUPEL: {ceiling_level: 17, mode: cutoff}
    QSNOW: {ceiling_level: 17, mode: cutoff}
    QNSNOW: {ceiling_level: 17, mode: cutoff}
  train_years: [2019, 2020]
  valid_years: [2021]
  train_date_range: ['20190101', '20201231']
  valid_date_range: ['20210415', '20210430']
  zarr_time_chunk: 2
  max_open_files_per_worker: 2
  max_dataset_open_retries: 4
  scaler_type: std-wrf
  variables: []
  surface_variables: []
  forcing_variables: []
  static_variables: []
  diagnostic_variables: []
  all_varnames: []
  history_len: 0
  valid_history_len: 0
  forecast_len: 0
  valid_forecast_len: 0
  target_start_step: 0
  lead_time_periods: 1
  static_first: false
model:
  type: wofs-diffmae
  modality_channels:
    background: 102
    precip: 136
    reflectivity: 17
    surface: 0
    forcing: 12
  precip_grouping: grouped
  precip_group_names: [QRAIN, QNRAIN, QHAIL, QNHAIL, QGRAUP, QNGRAUPEL, QSNOW, QNSNOW]
  precip_group_channels: [17, 17, 17, 17, 17, 17, 17, 17]
  conditioned_modalities: [background, forcing, reflectivity]
  target_modality: precip
  decoder_type: cross_self
  grouped_decoder_scope: per_group
  target_attention_window_size: 15
  anti_patch_refiner:
    enabled: true
    hidden_channels: 64
    depth: 3
    kernel_size: 5
    groups: 1
  patch_size: 4
  surface_forcing_stride: 16
  image_size: [300, 300]
  embed_dim: 384
  depth: 8
  num_heads: 8
  mlp_ratio: 4.0
  drop_path_rate: 0.05
  diffusion:
    timesteps: 1000
    sampling_timesteps: 200
    objective: pred_x0
    beta_schedule: sigmoid
    ddim_sampling_eta: 0.01
trainer:
  type: standard-wrf-diffmae
  mode: ddp
  ddp_find_unused_parameters: false
  use_file_locality_sampler: true
  train_batch_size: 8
  valid_batch_size: 8
  epochs: 500
  start_epoch: 0
  stopping_patience: 100
  batches_per_epoch: 7000
  valid_batches_per_epoch: 100
  reload_epoch: true
  train_one_epoch: false
  stop_after_epoch: false
  thread_workers: 8
  valid_thread_workers: 8
  prefetch_factor: 1
  pin_memory: true
  persistent_workers: true
  dataloader_timeout_s: 180
  no_hang_debug: false
  no_hang_thread_workers: 1
  no_hang_valid_thread_workers: 1
  no_hang_prefetch_factor: 1
  no_hang_valid_prefetch_factor: 1
  no_hang_pin_memory: false
  no_hang_persistent_workers: true
  no_hang_timeout_s: 180
  learning_rate: 1.0e-05
  weight_decay: 1.0e-05
  amp: true
  grad_max_norm: 1.0
  grad_accum_every: 1
  precip_mask_ratio: [0.6, 1.0]
  precip_mask_mode: mixed_height
  mixed_height_spatial_probability: 1.0
  mixed_height_channel_probability: 1.0
  mixed_height_height_probability: 1.0
  height_visible_levels: [14,15,16]
  val_mask_ratio: 1.0
  val_mask_mode: spatial_patch
  denoise_snapshot:
    enabled: true
    every_steps: 3000
    every_epoch: true
    dir: denoise_snapshots
    save_snapshot: false
    save_figure: true
    save_sampling_figure: true
    sampling_use_visible_precip: true
    sampling_timesteps: 200
    channel: 3
  load_weights: false
  load_optimizer: false
  load_scheduler: false
  load_scaler: false
  save_backup_weights: true
  save_best_weights: true
  training_metric: valid_loss
  training_metric_direction: min
  skip_validation: false
  save_metric_vars: [precip]
  use_scheduler: true
  scheduler:
    scheduler_type: cosine-annealing-restarts
    first_cycle_steps: 800
    cycle_mult: 2.0
    max_lr: 1.0e-04
    min_lr: 5.0e-06
    warmup_steps: 400
    gamma: 0.85
  residual_prediction: false
  update_learning_rate: false
eval:
  # mode options: none, ddp, fsdp. Controls rollout parallelism/checkpoint wrapping only.
  mode: ddp
  # ensemble_size: number of independent samples saved on the "ensemble" dimension.
  # For sampler=ddim with ddim_sampling_eta=0, rollout is deterministic and forces ensemble_size=1.
  ensemble_size: 8
  # eval_batch_size: number of ensemble members sampled together per timestep. Increase for speed until GPU memory is limiting.
  eval_batch_size: 8
  # sampler options: ddim, ddpm, repaint, repaint_ddim.
  # ddim uses a sparse deterministic/stochastic DDIM path; ddpm uses all diffusion steps.
  # repaint uses DDPM-style forward/backward jumps; repaint_ddim uses DDIM steps with inner RePaint resampling.
  sampler: ddim
  # sampling_timesteps: DDIM/repaint_ddim step count. For repaint, this caps the starting time at sampling_timesteps - 1.
  sampling_timesteps: 100
  # ddim_sampling_eta: DDIM stochasticity; 0 is deterministic, larger values add noise. Used by ddim only.
  ddim_sampling_eta: 0.02
  # repaint_jump_length: adjacent forward noising steps in each DDPM-style repaint jump. Ignored by repaint_ddim.
  repaint_jump_length: 10
  # repaint_jump_n_sample: RePaint resampling count. For repaint_ddim this is the paper's [https://arxiv.org/pdf/2304.03760] inner loop count U.
  repaint_jump_n_sample: 5
  # precip_mask_ratio: fraction of eligible precip patch elements to inpaint.
  precip_mask_ratio: 0.75
  # precip_mask_mode options: spatial_patch, channel_patch, height_patch, mixed, mixed_height.
  # spatial_patch shares one x/y mask; channel_patch masks precip groups independently.
  # height_patch masks group-level-patch elements; mixed_height samples among spatial/channel/height modes.
  precip_mask_mode: spatial_patch
  # mixed_height_*_probability: nonnegative weights used only when precip_mask_mode=mixed_height.
  mixed_height_spatial_probability: 1.0
  mixed_height_channel_probability: 1.0
  mixed_height_height_probability: 1.0
  # height_visible_levels: zero-based vertical levels kept visible/excluded from height_patch masking.
  height_visible_levels: [14,15,16]
  # visible_precip_conditioning: when true, eval passes clean visible precip as
  # context tokens. The model internally zeros masked precip before tokenizing,
  # so masked truth is not exposed.
  visible_precip_conditioning: true
  # clamp_visible_precip is kept as a backward-compatible alias for
  # visible_precip_conditioning.
  clamp_visible_precip: true
  # Strict DiffMAE sampling does not paste visible pixels into the sample state.
  # This flag is accepted by older call sites but ignored by WoFSDiffMAE.
  clamp_final_visible_precip: false
  # visible_blend_*: optional normalized-space smoothing after sampling.
  visible_blend_width_px: 0
  visible_blend_strength: 0.25
  visible_blend_passes: 1
  # save_norm_output: also write normalized model-space output in the zarr group "norm_output".
  save_norm_output: true
  # overwrite: remove an existing analysis zarr store before writing.
  overwrite: true
  # save_denoise_trajectory: write selected normalized reverse-process states to group "denoise_trajectory".
  save_denoise_trajectory: false
  # trajectory_channels: global precip channel indices [0, 17, 34, 51, 68, 85, 102, 119] to save when save_denoise_trajectory=true.
  trajectory_channels: [0, 17, 40, 57, 78, 95, 112, 129]
  # trajectory_stride: save every Nth reverse-process state in the denoise trajectory.
  trajectory_stride: 25
loss:
  latitude_weights: ''
  use_latitude_weights: false
  use_variable_weights: false
  training_loss: mse
pbs:
  queue: main
  account: NAML0001
  walltime: '12:00:00'
  nodes: 1
  ncpus_per_node: 128
  ngpus_per_node: 4
  mem: 240GB
  jobname: wofs-diffmae-height

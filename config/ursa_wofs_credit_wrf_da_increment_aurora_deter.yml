save_loc: '/scratch3/NAGAPE/gpu-ai4wp/Zhanxiang.Hua/credit_runs/wofs_da_increment_experiment_0505_deter'
seed: 1000

data:
  scaler_type: 'std-wrf'

  # Prognostic variables: these are predicted (input + output, 3D with levels)
  variables: ['QRAIN', 'QNRAIN', 'QHAIL', 'QNHAIL', 'QGRAUP', 'QNGRAUPEL', 'QSNOW', 'QNSNOW']

  # Context upper-air variables: 3D atmospheric state context (input-only)
  # Flattened to var*level channels and passed as input_only_channels
  context_upper_air_variables: ['T', 'QVAPOR', 'U', 'V', 'W', 'GEOPOT', 'REFL_10CM']

  # Observation variable: used to construct the innovation (obs - analysis proxy)
  observation_variables: ['REFL_10CM']

  surface_variables: []
  dynamic_forcing_variables: ['cos_latitude', 'sin_latitude', 'cos_longitude', 'sin_longitude', 'cos_julian_day', 'sin_julian_day', 'cos_local_time', 'sin_local_time', 'cos_solar_zenith_angle', 'insolation','XLAND','HGT']
  diagnostic_variables: []
  forcing_variables: []
  static_variables: []

  save_loc: '/scratch5/purged/Zhanxiang.Hua/wofs_preprocess_to_credit_0413/cases/wofs_*.zarr.zip'
  save_loc_surface: '/scratch5/purged/Zhanxiang.Hua/wofs_preprocess_to_credit_0413/cases/wofs_*.zarr.zip'
  save_loc_dynamic_forcing: '/scratch5/purged/Zhanxiang.Hua/wofs_preprocess_to_credit_0413/cases/wofs_*.zarr.zip'
  save_loc_diagnostic: ''

  mean_path: '/scratch5/purged/Zhanxiang.Hua/wofs_preprocess_to_credit_0413/stats3/mean.nc'
  std_path: '/scratch5/purged/Zhanxiang.Hua/wofs_preprocess_to_credit_0413/stats3/std.nc'
  ## concentration_params_json: '/scratch5/purged/Zhanxiang.Hua/wofs_preprocess_to_credit_0413/stats/concentration_tuning.json'
  # Simple invertible log-zscore transform for concentration variables.
  # When set, replaces the piecewise concentration transform with:
  #   forward:  z = (log(clip(x, clip_min, clip_max)) - log_mean) / log_std
  #   inverse:  x = clip(exp(z * log_std + log_mean), clip_min, clip_max)
  # Generate with: python python_scripts/build_log_transform_params.py \
  #   --input  <stats_dir>/concentration_tuning.json \
  #   --output <stats_dir>/log_transform_params.json
  log_transform_params_json: '/scratch5/purged/Zhanxiang.Hua/wofs_preprocess_to_credit_0413/stats3/zero_inflated_transform_params.json'
  concentration_normalization_mode: 'zscore'  # options: zscore | transform_only | scale_only

  concentration_level_ops:
    QRAIN:
      ceiling_level: 17
      mode: 'cutoff'   # options: cutoff | sum | mean
    QNRAIN:
      ceiling_level: 17
      mode: 'cutoff'   # options: cutoff | sum | mean
    QHAIL:
      ceiling_level: 17
      mode: 'cutoff'   # options: cutoff | sum | mean
    QNHAIL:
      ceiling_level: 17
      mode: 'cutoff'   # options: cutoff | sum | mean
    QGRAUP:
      ceiling_level: 17
      mode: 'cutoff'   # options: cutoff | sum | mean
    QNGRAUPEL:
      ceiling_level: 17
      mode: 'cutoff'   # options: cutoff | sum | mean
    QSNOW:
      ceiling_level: 17
      mode: 'cutoff'   # options: cutoff | sum | mean
    QNSNOW:
      ceiling_level: 17
      mode: 'cutoff'   # options: cutoff | sum | mean
    

  train_years: [2019,2020]
  valid_years: [2021]

  train_date_range: ['20190101', '20201231']
  valid_date_range: ['20210415', '20210430']

  delta_steps: [1, 2, 3]        # timestep deltas sampled during training
  delta_probs: [0.2, 0.5, 0.3]  # sampling probabilities (must sum to 1)

  history_len: 1
  valid_history_len: 1
  forecast_len: 0
  valid_forecast_len: 0
  target_start_step: 1
  zarr_time_chunk: 2
  max_open_files_per_worker: 2
  lead_time_periods: 1
  levels: 17
  prognostic_levels: 17  # effective model levels for concentration prognostic variables
  occupancy_delta_threshold: 5.0e-9
  occupancy_delta_threshold_by_var: {}
  occupancy_variables: ['QRAIN', 'QNRAIN', 'QHAIL', 'QNHAIL', 'QGRAUP', 'QNGRAUPEL', 'QSNOW', 'QNSNOW']
  occupancy_target_source: 'delta_abs'
  static_first: False

  boundary:
    variables: ['REFL_10CM']
    surface_variables: []
    reuse_interior_stats: True
    levels: 17
    history_len: 1
    forecast_len: 0
    all_varnames: ['REFL_10CM']

  # all_varnames covers only the prognostic variables (used by loss/metrics)
  all_varnames: ['QRAIN', 'QNRAIN', 'QHAIL', 'QNHAIL', 'QGRAUP', 'QNGRAUPEL', 'QSNOW', 'QNSNOW']

model:
  type: 'aurora_crossformer_wrf_da'

  varname_upper_air: ['QRAIN', 'QNRAIN', 'QHAIL', 'QNHAIL', 'QGRAUP', 'QNGRAUPEL', 'QSNOW', 'QNSNOW']
  varname_input_upper_air: ['T', 'QVAPOR', 'U', 'V', 'W', 'GEOPOT', 'REFL_10CM']
  varname_surface: []
  varname_dyn_forcing: ['cos_latitude', 'sin_latitude', 'cos_longitude', 'sin_longitude', 'cos_julian_day', 'sin_julian_day', 'cos_local_time', 'sin_local_time', 'cos_solar_zenith_angle', 'insolation','XLAND','HGT']
  varname_forcing: []
  varname_static: []
  varname_diagnostic: []

  varname_boundary_upper: ['REFL_10CM']
  varname_boundary_surface: []

  levels: 17
  boundary_levels: 17
  frames: 1
  embed_dim: 96
  boundary_embed_dim: 196
  time_encode_dim: 12
  dim: [64, 128, 192, 256]
  depth: [2, 2, 4, 6]
  dim_head: 32
  global_window_size: [8, 6, 4, 1]
  local_window_size: 8
  cross_embed_kernel_sizes:
    - [4, 8, 16, 32]
    - [2, 4]
    - [2, 4]
    - [2, 4]
  cross_embed_strides: [2, 2, 2, 2]
  attn_dropout: 0.0
  ff_dropout: 0.0
  use_spectral_norm: True
  noise_injection:
    activate: False
    latent_dim: 128
    noise_scales: [0.1, 0.06, 0.03, 0.01]
    encoder_noise: True
    correlated: False
    sample_latent_if_none: True
    freeze_base_model_weights: False
  padding_conf:
    activate: True
    mode: mirror
    pad_lat: [16, 16]
    pad_lon: [16, 16]
  param_interior:
    frames: 1
    image_height: 300
    image_width: 300
    levels: 17
    channels: 8            # QRAIN, QNRAIN (prognostic, with level expansion)
    surface_channels: 0
    input_only_channels: 131  # 7 context vars * 17 levels + 12 dynamic forcing
    output_only_channels: 0   # no diagnostics
    patch_height: 4
    patch_width: 4
    frame_patch_size: 1
    dim: 192
  param_outside:
    frames: 1
    image_height: 300
    image_width: 300
    levels: 17
    channels: 1            # REFL_10CM innovation only
    surface_channels: 0
    patch_height: 4
    patch_width: 4
    frame_patch_size: 1
    dim: 192

trainer:
  type: 'standard-wrf'
  mode: 'ddp'
  ddp_find_unused_parameters: False
  use_file_locality_sampler: True
  sync_batch_barrier: False
  no_hang_debug: False
  no_hang_thread_workers: 1
  no_hang_valid_thread_workers: 1
  no_hang_prefetch_factor: 1
  no_hang_valid_prefetch_factor: 1
  no_hang_pin_memory: False
  no_hang_persistent_workers: True
  no_hang_timeout_s: 180
  train_batch_size: 24
  valid_batch_size: 24
  batches_per_epoch: 0
  valid_batches_per_epoch: 0
  thread_workers: 6
  valid_thread_workers: 6
  prefetch_factor: 1
  dataloader_timeout_s: 360
  update_learning_rate: False
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  amp: True
  residual_prediction: False   # output IS the increment — no residual skip needed
  progress_bar:
    enabled: true
    missing: nan  # options: hide | nan
    metrics:
      - physical_concentration_loss_weighted
      - refl_operator_constraint_loss_weighted
      - microphysics_constraint_loss_weighted
      - reg_loss
      - occ_ce
  epochs: &epochs 100
  start_epoch: 0
  load_weights: False
  load_optimizer: False
  load_scheduler: False
  load_scaler: False
  skip_validation: True
  use_scheduler: True
  reload_epoch: True
  scheduler:
    scheduler_type: cosine-annealing-restarts
    first_cycle_steps: 1000
    cycle_mult: 2.0
    max_lr: 1.0e-04
    min_lr: 5.0e-05
    warmup_steps: 999
    gamma: 0.8
  grad_max_norm: 1.0
  grad_accum_every: 1
  save_backup_weights: True
  save_best_weights: True
  save_metric_vars: ['QRAIN', 'QNRAIN', 'QHAIL', 'QNHAIL', 'QGRAUP', 'QNGRAUPEL', 'QSNOW', 'QNSNOW']

loss:
  latitude_weights: '/scratch5/purged/Zhanxiang.Hua/wofs_preprocess_to_credit_0409/stats_da/latitude_weights_placeholder.nc'
  use_latitude_weights: False
  use_variable_weights: False
  use_spectral_loss: False
  use_power_loss: False
  training_loss: 'mse'
  
  occupancy:
    enabled: false
    delta_threshold: 1.0e-8
    delta_threshold_by_var: {}
    variables: ['QRAIN', 'QNRAIN', 'QHAIL', 'QNHAIL', 'QGRAUP', 'QNGRAUPEL', 'QSNOW', 'QNSNOW']
    target_source: 'delta_abs'
    use_masked_regression: false
    masked_regression_mode: 'soft'
    reg_mask_min: 0.05
    ce_weight: 0.2
    pos_weight: 4.0
    logit_temperature: 0.25
    use_focal: false
    focal_weight: 0.0
    focal_alpha: 0.25
    focal_gamma: 2.0
    use_dice: false
    dice_weight: 0.0
    dice_smooth: 1.0
  use_microphysics_constraint: true
  microphysics_constraint_weight: 0.001
  microphysics_constraint:
    sign_weight:    0.5
    corr_weight:    0.2
    coral_weight:   0.15
    sign_threshold: 0.1

  # H-operator (reflectivity) constraint — compares diagnosed ΔdBZ to boundary innovation
  use_refl_operator_constraint: true
  refl_operator_constraint_weight: 0.001
  refl_operator_constraint:
    mode: innovation           # innovation | absolute (innovation recommended)
    compare_space: dbz         # dbz | normalized (dbz recommended for fidelity)
    dbz_floor: 0.1             # lower bound for diagnosed dBZ
    threshold_dbz: 0.5        # mask magnitudes below this (clear-air noise gate)
    threshold_norm: 0.05       # mask for normalized mode (unused when compare_space=dbz)
    include_species: [rain, snow, graupel, hail]

  # Physical-space concentration increment loss.
  # Compares inverse(z0 + predicted_delta_z) - inverse(z0) against
  # inverse(z0 + target_delta_z) - inverse(z0), with hydrometeor-region masking.
  use_physical_concentration_loss: true
  physical_concentration_loss_weight: 1.0e-6
  physical_concentration_loss:
    variables: ['QRAIN', 'QNRAIN', 'QHAIL', 'QNHAIL', 'QGRAUP', 'QNGRAUPEL', 'QSNOW', 'QNSNOW']
    huber_weight: 1.0
    log_ratio_weight_mass: 0.2
    log_ratio_weight_qn: 1.0
    ratio_threshold: 2.0
    ratio_penalty_weight: 2.0
    ratio_power: 2.0
    max_log_ratio: 3.0
    max_ratio_weight: 25.0
    max_scaled_error: 50.0
    positive_mass_underprediction_weight: 0.1
    huber_beta: 1.0
    mask_min: 1.0e-12
    increment_min: 1.0e-12
    eps_mass: 1.0e-12
    eps_qn: 1.0e-6
    threshold_by_var:
      QRAIN: 1.0e-12
      QHAIL: 1.0e-12
      QGRAUP: 1.0e-12
      QSNOW: 1.0e-12
      QNRAIN: 1.0e-6
      QNHAIL: 1.0e-6
      QNGRAUPEL: 1.0e-6
      QNSNOW: 1.0e-6
    increment_threshold_by_var:
      QRAIN: 1.0e-12
      QHAIL: 1.0e-12
      QGRAUP: 1.0e-12
      QSNOW: 1.0e-12
      QNRAIN: 1.0e-6
      QNHAIL: 1.0e-6
      QNGRAUPEL: 1.0e-6
      QNSNOW: 1.0e-6
    scale_by_var:
      QRAIN: 1.0e-9
      QHAIL: 1.0e-9
      QGRAUP: 1.0e-9
      QSNOW: 1.0e-9
      QNRAIN: 1.0e3
      QNHAIL: 1.0e3
      QNGRAUPEL: 1.0e3
      QNSNOW: 1.0e3

  variable_weights:
    QRAIN: [2.412559, 2.412284, 2.555078, 2.584206, 2.243196, 2.068756, 1.623277, 0.830359, 0.169828, 0.057489, 0.056585, 0.055757, 0.055588, 0.055945, 0.055397, 0.056074, 0.056151]

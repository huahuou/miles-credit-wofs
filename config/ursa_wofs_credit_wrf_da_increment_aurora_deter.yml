    QNHAIL: [0.868628, 0.890926, 0.993543, 1.141549, 1.307452, 1.393503, 1.251521, 1.020835, 0.848095, 0.699031, 0.527079, 0.272393, 0.092595, 0.057112, 0.055352, 0.056355, 0.056101]
    QGRAUP: [0.782585, 0.858042, 1.120110, 1.613600, 2.001499, 2.001269, 1.608786, 1.021708, 0.735403, 0.560589, 0.423074, 0.258903, 0.105689, 0.060049, 0.055663, 0.055944, 0.055909]
    QNGRAUPEL: [1.379448, 1.509040, 1.963846, 2.569319, 2.751276, 2.810764, 2.545410, 1.756926, 1.256289, 0.962154, 0.732617, 0.452278, 0.149285, 0.064260, 0.055639, 0.056025, 0.055795]
    QSNOW: [0.075125, 0.082214, 0.124737, 0.338048, 1.153391, 1.821172, 1.996127, 2.148414, 2.345832, 2.290819, 1.750379, 0.929081, 0.336493, 0.096018, 0.057653, 0.056016, 0.056015]

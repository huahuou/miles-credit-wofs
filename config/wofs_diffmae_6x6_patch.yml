  - cos_longitude
  - sin_longitude
  - cos_julian_day
  - sin_julian_day
  - cos_local_time
  - sin_local_time
  - cos_solar_zenith_angle
  - insolation
  - XLAND
  - HGT
  levels: 17
  prognostic_levels: 17
  mae_pad_to: 300
  mae_include_t1_refl: false
  concentration_level_ops:
    QRAIN:
      ceiling_level: 17
      mode: cutoff
    QNRAIN:
      ceiling_level: 17
      mode: cutoff
    QHAIL:
      ceiling_level: 17
      mode: cutoff
    QNHAIL:
      ceiling_level: 17
      mode: cutoff
    QGRAUP:
      ceiling_level: 17
      mode: cutoff
    QNGRAUPEL:
      ceiling_level: 17
      mode: cutoff
    QSNOW:
      ceiling_level: 17
      mode: cutoff
    QNSNOW:
      ceiling_level: 17
      mode: cutoff
  train_years:
  - 2019
  - 2020
  valid_years:
  - 2021
  train_date_range:
  - '20190101'
  - '20201231'
  valid_date_range:
  - '20210415'
  - '20210430'
  zarr_time_chunk: 2
  max_open_files_per_worker: 2
  max_dataset_open_retries: 4
  scaler_type: std-wrf
  variables: []
  surface_variables: []
  forcing_variables: []
  static_variables: []
  diagnostic_variables: []
  all_varnames: []
  history_len: 1
  valid_history_len: 1
  forecast_len: 0
  valid_forecast_len: 0
  target_start_step: 0
  lead_time_periods: 1
  static_first: false
model:
  type: wofs-diffmae
  modality_channels:
    background: 102
    precip: 136
    reflectivity: 17
    surface: 0
    forcing: 12
  precip_grouping: grouped
  precip_group_names:
  - QRAIN
  - QNRAIN
  - QHAIL
  - QNHAIL
  - QGRAUP
  - QNGRAUPEL
  - QSNOW
  - QNSNOW
  precip_group_channels:
  - 17
  - 17
  - 17
  - 17
  - 17
  - 17
  - 17
  - 17
  conditioned_modalities:
  - background
  - forcing
  - reflectivity
  target_modality: precip
  # decoder_type options: concat_self, cross_self. cross_self uses DiffMAE-style target-to-context cross-attention followed by target self-attention.
  decoder_type: cross_self
  # grouped_decoder_scope options: per_group, joint. per_group is much cheaper; joint lets all precip variable-group tokens self-attend together.
  grouped_decoder_scope: per_group
  patch_size: 6
  surface_forcing_stride: 16
  image_size:
  - 300
  - 300
  embed_dim: 384
  depth: 8
  num_heads: 8
  mlp_ratio: 4.0
  drop_path_rate: 0.05
  diffusion:
    timesteps: 1000
    sampling_timesteps: 200
    objective: pred_x0
    beta_schedule: sigmoid
    ddim_sampling_eta: 0.01
trainer:
  type: standard-wrf-diffmae
  mode: ddp
  ddp_find_unused_parameters: false
  use_file_locality_sampler: true
  train_batch_size: 8
  valid_batch_size: 8
  epochs: 100
  start_epoch: 0
  stopping_patience: 100
  batches_per_epoch: 7000
  valid_batches_per_epoch: 100
  reload_epoch: true
  train_one_epoch: false
  stop_after_epoch: false
  thread_workers: 8
  valid_thread_workers: 8
  prefetch_factor: 1
  pin_memory: true
  persistent_workers: true
  dataloader_timeout_s: 180
  no_hang_debug: false
  no_hang_thread_workers: 1
  no_hang_valid_thread_workers: 1
  no_hang_prefetch_factor: 1
  no_hang_valid_prefetch_factor: 1
  no_hang_pin_memory: false
  no_hang_persistent_workers: true
  no_hang_timeout_s: 180
  learning_rate: 0.0001
  weight_decay: 1.0e-05
  amp: true
  grad_max_norm: 1.0
  grad_accum_every: 1
  precip_mask_ratio:
  - 0.7
  - 1.0
  precip_mask_mode: mixed
  channel_patch_mask_probability: 0.5
  val_mask_ratio: 1.0
  val_mask_mode: spatial_patch
  denoise_snapshot:
    enabled: true
    every_steps: 3000
    every_epoch: true
    dir: denoise_snapshots
    save_snapshot: false
    save_figure: true
    save_sampling_figure: true
    sampling_use_visible_precip: true
    sampling_timesteps: 200
    channel: 0
  load_weights: false
  load_optimizer: false
  load_scheduler: false
  load_scaler: false
  save_backup_weights: true
  save_best_weights: true
  training_metric: valid_loss
  training_metric_direction: min
  skip_validation: false
  save_metric_vars:
  - precip
  use_scheduler: true
  scheduler:
    scheduler_type: cosine-annealing-restarts
    first_cycle_steps: 1000
    cycle_mult: 2.0
    max_lr: 5.0e-04
    min_lr: 1.0e-05
    warmup_steps: 500
    gamma: 0.8
  residual_prediction: false
  update_learning_rate: false
eval:
  # mode options: none, ddp, fsdp. Controls rollout parallelism/checkpoint wrapping only.
  mode: ddp
  # sampler options: ddim, ddpm, repaint. repaint uses RePaint resampling jumps for inpainting with known precip clamping.
  sampler: ddim
  # sampling_timesteps: DDIM step count; for RePaint, starts from min(num_timesteps - 1, sampling_timesteps - 1) for faster rollout.
  sampling_timesteps: 400
  # ddim_sampling_eta: DDIM stochasticity; 0 is deterministic, larger values add noise. Ignored by ddpm/repaint.
  ddim_sampling_eta: 0.01
  # repaint_jump_length: number of adjacent forward noising steps in each RePaint resampling jump.
  repaint_jump_length: 10
  # repaint_jump_n_sample: total visits at each RePaint jump point; values >1 repeat forward/backward resampling.
  repaint_jump_n_sample: 5
  # precip_mask_ratio: fraction of precip patches or variable-group patches to inpaint.
  precip_mask_ratio: 0.75
  # precip_mask_mode options: spatial_patch, channel_patch. spatial_patch shares x/y mask; channel_patch masks variable groups independently.
  precip_mask_mode: spatial_patch
  # clamp_visible_precip: when true, visible precip is re-noised to each diffusion timestep and reinserted during sampling.
  clamp_visible_precip: true
  # save_norm_output: also write normalized model-space output in the zarr group "norm_output".
  save_norm_output: true
  # overwrite: remove an existing analysis zarr store before writing.
  overwrite: true
  # save_denoise_trajectory: save selected normalized channels across sampling steps in the zarr group "denoise_trajectory".
  save_denoise_trajectory: true
  # trajectory_channels: global precip channel indices to save in the denoising trajectory.
  trajectory_channels:
  - 0
  - 2
  - 5
  # trajectory_stride: keep every Nth saved sampler state to reduce trajectory output size.
  trajectory_stride: 10
loss:
  latitude_weights: ''
  use_latitude_weights: false
  use_variable_weights: false
  training_loss: mse
pbs:
  queue: main
  account: NAML0001
  walltime: '12:00:00'
  nodes: 1
  ncpus_per_node: 128
  ngpus_per_node: 4
  mem: 240GB
  jobname: wofs-diffmae

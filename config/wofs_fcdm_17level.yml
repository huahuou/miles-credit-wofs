    first_cycle_steps: 1200
    cycle_mult: 1.0
    max_lr: 6.0e-05
    min_lr: 1.0e-06
    warmup_steps: 300
    gamma: 0.85
  residual_prediction: false
  update_learning_rate: false
eval:
  mode: ddp
  ensemble_size: 8
  eval_batch_size: 8
  sampler: ddim
  sampling_timesteps: 100
  ddim_sampling_eta: 0.02
  repaint_jump_length: 10
  repaint_jump_n_sample: 5
  precip_mask_ratio: 0.75
  precip_mask_mode: cube_patch
  visible_precip_conditioning: false
  inpaint_mode: compose_visible
  clamp_visible_precip: false
  clamp_final_visible_precip: false
  visible_blend_width_px: 0
  visible_blend_strength: 0.25
  visible_blend_passes: 1
  save_norm_output: true
  overwrite: true
  save_denoise_trajectory: false

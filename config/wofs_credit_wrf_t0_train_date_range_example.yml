save_loc: '/tmp/credit_wofs_t0_train_date_range_example'
seed: 1000

data:
  scaler_type: 'std-wrf'
  variables: ['T', 'QVAPOR', 'U', 'V', 'W', 'GEOPOT']
  surface_variables: ['T2', 'Q2', 'U10', 'V10']
  dynamic_forcing_variables: ['cos_latitude', 'sin_latitude', 'cos_longitude', 'sin_longitude', 'cos_julian_day', 'sin_julian_day', 'cos_local_time', 'sin_local_time', 'cos_solar_zenith_angle', 'insolation']
  diagnostic_variables: ['COMPOSITE_REFL_10CM', 'UP_HELI_MAX', 'WSPD80', 'W_UP_MAX', 'LWP', 'RAIN_AMOUNT']
  forcing_variables: []
  static_variables: []

  # Example using the converted WoFS case archives directly.
  save_loc: '/work2/zhanxianghua/wofs_preprocess_to_credit/cases/wofs_*.zarr'
  save_loc_surface: '/work2/zhanxianghua/wofs_preprocess_to_credit/cases/wofs_*.zarr'
  save_loc_dynamic_forcing: '/work2/zhanxianghua/wofs_preprocess_to_credit/cases/wofs_*.zarr'
  save_loc_diagnostic: '/work2/zhanxianghua/wofs_preprocess_to_credit/cases/wofs_*.zarr'

  # Replace these with your preferred stats path if needed.
  mean_path: '/tmp/wofs_credit_stats_parallel/mean.nc'
  std_path: '/tmp/wofs_credit_stats_parallel/std.nc'

  # Keep the legacy year fields because the parser expects them.
  # The WoFS train/test apps will use the date ranges below when present.
  train_years: [2019, 2020]
  valid_years: [2019, 2020]

  # Inclusive YYYYMMDD date filtering for WoFS case filenames.
  train_date_range: ['20190401', '20190701']
  valid_date_range: ['20190702', '20191030']

  history_len: 1
  valid_history_len: 1
  forecast_len: 0
  valid_forecast_len: 0
  lead_time_periods: 1
  levels: 9
  static_first: False

  boundary:
    variables: ['T', 'QVAPOR', 'U', 'V', 'W', 'GEOPOT']
    surface_variables: ['T2', 'Q2', 'U10', 'V10']
    reuse_interior_stats: True
    levels: 9
    history_len: 1
    forecast_len: 0
    all_varnames: ['T', 'QVAPOR', 'U', 'V', 'W', 'GEOPOT', 'T2', 'Q2', 'U10', 'V10']

  all_varnames: ['T', 'QVAPOR', 'U', 'V', 'W', 'GEOPOT', 'T2', 'Q2', 'U10', 'V10', 'cos_latitude', 'sin_latitude', 'cos_longitude', 'sin_longitude', 'cos_julian_day', 'sin_julian_day', 'cos_local_time', 'sin_local_time', 'cos_solar_zenith_angle', 'insolation', 'COMPOSITE_REFL_10CM', 'UP_HELI_MAX', 'WSPD80', 'W_UP_MAX', 'LWP', 'RAIN_AMOUNT']

model:
  # Keep 'wrf' here. The WoFS WRF trainers call model(x, x_boundary, x_time_encode).
  # WXFormer in this repo currently exposes forward(x) only, so it is not drop-in compatible.
  type: 'wrf'
  levels: 9
  param_interior:
    frames: 1
    image_height: 300
    image_width: 300
    levels: 9
    channels: 6
    surface_channels: 4
    input_only_channels: 10
    output_only_channels: 6
    patch_height: 1
    patch_width: 1
    frame_patch_size: 1
    dim: 96
  param_outside:
    frames: 1
    image_height: 300
    image_width: 300
    levels: 9
    channels: 6
    surface_channels: 4
    patch_height: 1
    patch_width: 1
    frame_patch_size: 1
    dim: 96
  depth: 2
  num_heads: 4
  window_size: 5
  use_spectral_norm: True

trainer:
  type: 'standard-wrf'
  mode: 'none'
  train_batch_size: 1
  valid_batch_size: 1
  batches_per_epoch: 1
  valid_batches_per_epoch: 1
  thread_workers: 0
  valid_thread_workers: 0
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  amp: False
  epochs: 1
  start_epoch: 0
  load_weights: False
  load_optimizer: False
  load_scheduler: False
  load_scaler: False
  skip_validation: True
  use_scheduler: False
  grad_max_norm: 1.0

loss:
  latitude_weights: '/tmp/wofs_credit_stats_parallel/latitude_weights_placeholder.nc'
  use_latitude_weights: False
  use_variable_weights: False
  training_loss: 'mse'
  variable_weights:
    T: 1.0
    QVAPOR: 1.0
    U: 1.0
    V: 1.0
    W: 1.0
    GEOPOT: 1.0

predict:
  # For the WoFS train/test apps this disables rollout parsing and execution.
  mode: 'none'

  # Optional metadata only for now: the current WoFS training apps do not consume this.
  custom_date_range: ['20190702', '20191030']